services:
  - type: web
    name: trademind-ai-backend
    runtime: node
    plan: free
    rootDir: frontend/backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: FRONTEND_URL
        sync: false
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: TWELVE_DATA_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
